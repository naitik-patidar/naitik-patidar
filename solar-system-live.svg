<svg width="100%" viewBox="0 0 860 360" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Live solar system — naitik-patidar</title>
<desc>Planets orbit faster when naitik-patidar commits more. Updated 2026-07-13 03:27 UTC.</desc>
<defs>
  <style>
    .orbit { fill: none; stroke: #6AD3F7; stroke-width: 0.4; opacity: 0.2; }
    .lbl { font-family: 'Fira Code', 'Courier New', monospace; font-size: 9px; fill: #6AD3F7; opacity: 0.55; }
    .stat-lbl { font-family: 'Fira Code', 'Courier New', monospace; font-size: 10px; fill: #6AD3F7; opacity: 0.7; }
    .stat-val  { font-family: 'Fira Code', 'Courier New', monospace; font-size: 13px; fill: #6AD3F7; font-weight: bold; opacity: 0.95; }
    .updated { font-family: 'Fira Code', 'Courier New', monospace; font-size: 8px; fill: #6AD3F7; opacity: 0.25; }

    .mercury-g { transform-origin: 170px 185px; animation: spin 7.6s linear infinite; }
    .venus-g   { transform-origin: 170px 185px; animation: spin 4.0s linear infinite; }
    .earth-g   { transform-origin: 170px 185px; animation: spin 6.0s linear infinite; }
    .mars-g    { transform-origin: 170px 185px; animation: spin 9.0s linear infinite; }
    .jupiter-g { transform-origin: 170px 185px; animation: spin 15.0s linear infinite; }
    .saturn-g  { transform-origin: 170px 185px; animation: spin 25.0s linear infinite; }
    .uranus-g  { transform-origin: 170px 185px; animation: spin 40.0s linear infinite; }
    .neptune-g { transform-origin: 170px 185px; animation: spin 60.0s linear infinite; }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .sun-glow { animation: sunglow 3s ease-in-out infinite; }
    @keyframes sunglow {
      0%, 100% { r: 28; opacity: 0.15; }
      50%       { r: 36; opacity: 0.30; }
    }
    .sun-core { animation: suncore 3s ease-in-out infinite; }
    @keyframes suncore {
      0%, 100% { r: 22; }
      50%       { r: 25; }
    }
  </style>
</defs>

<rect width="860" height="360" fill="#0d1117" rx="12"/>

<!-- Stars -->
<circle cx="20"  cy="15"  r="0.8" fill="#fff" opacity="0.6"/>
<circle cx="55"  cy="40"  r="0.6" fill="#fff" opacity="0.4"/>
<circle cx="90"  cy="10"  r="1.0" fill="#fff" opacity="0.7"/>
<circle cx="130" cy="55"  r="0.7" fill="#fff" opacity="0.5"/>
<circle cx="10"  cy="80"  r="0.9" fill="#fff" opacity="0.6"/>
<circle cx="45"  cy="120" r="0.5" fill="#fff" opacity="0.3"/>
<circle cx="70"  cy="310" r="0.8" fill="#fff" opacity="0.5"/>
<circle cx="30"  cy="270" r="0.6" fill="#fff" opacity="0.4"/>
<circle cx="110" cy="330" r="1.0" fill="#fff" opacity="0.6"/>
<circle cx="760" cy="20"  r="0.8" fill="#fff" opacity="0.5"/>
<circle cx="800" cy="55"  r="0.6" fill="#fff" opacity="0.4"/>
<circle cx="830" cy="15"  r="1.0" fill="#fff" opacity="0.7"/>
<circle cx="840" cy="290" r="0.6" fill="#fff" opacity="0.4"/>
<circle cx="820" cy="340" r="0.9" fill="#fff" opacity="0.6"/>
<circle cx="340" cy="15"  r="0.8" fill="#fff" opacity="0.5"/>
<circle cx="500" cy="340" r="0.6" fill="#fff" opacity="0.4"/>

<!-- Orbit rings centered at (170, 185) -->
<circle class="orbit" cx="170" cy="185" r="38"/>
<circle class="orbit" cx="170" cy="185" r="58"/>
<circle class="orbit" cx="170" cy="185" r="80"/>
<circle class="orbit" cx="170" cy="185" r="105"/>
<circle class="orbit" cx="170" cy="185" r="143"/>
<circle class="orbit" cx="170" cy="185" r="183"/>
<circle class="orbit" cx="170" cy="185" r="222"/>
<circle class="orbit" cx="170" cy="185" r="260"/>

<!-- Sun -->
<circle class="sun-glow" cx="170" cy="185" r="28" fill="#EF9F27"/>
<circle class="sun-core" cx="170" cy="185" r="22" fill="#EF9F27"/>
<circle cx="170" cy="185" r="18" fill="#FAC775"/>

<!-- Mercury -->
<g class="mercury-g">
  <circle cx="208" cy="185" r="4" fill="#888780"/>
  <text x="208" y="175" class="lbl" text-anchor="middle">Mercury</text>
</g>

<!-- Venus -->
<g class="venus-g">
  <circle cx="228" cy="185" r="6" fill="#EF9F27"/>
  <text x="228" y="173" class="lbl" text-anchor="middle">Venus</text>
</g>

<!-- Earth -->
<g class="earth-g">
  <circle cx="250" cy="185" r="6.5" fill="#378ADD"/>
  <circle cx="253" cy="182" r="2.5" fill="#3B6D11" opacity="0.9"/>
  <text x="250" y="173" class="lbl" text-anchor="middle">Earth</text>
</g>

<!-- Mars -->
<g class="mars-g">
  <circle cx="275" cy="185" r="5" fill="#D85A30"/>
  <text x="275" y="174" class="lbl" text-anchor="middle">Mars</text>
</g>

<!-- Jupiter -->
<g class="jupiter-g">
  <circle cx="313" cy="185" r="11" fill="#BA7517"/>
  <ellipse cx="313" cy="187" rx="11" ry="2.5" fill="#854F0B" opacity="0.4"/>
  <text x="313" y="170" class="lbl" text-anchor="middle">Jupiter</text>
</g>

<!-- Saturn -->
<g class="saturn-g">
  <ellipse cx="353" cy="185" rx="20" ry="4" fill="none" stroke="#BA7517" stroke-width="3" opacity="0.5"/>
  <circle cx="353" cy="185" r="9" fill="#EF9F27"/>
  <text x="353" y="171" class="lbl" text-anchor="middle">Saturn</text>
</g>

<!-- Uranus -->
<g class="uranus-g">
  <circle cx="392" cy="185" r="7.5" fill="#5DCAA5"/>
  <text x="392" y="172" class="lbl" text-anchor="middle">Uranus</text>
</g>

<!-- Neptune -->
<g class="neptune-g">
  <circle cx="430" cy="185" r="7" fill="#185FA5"/>
  <text x="430" y="172" class="lbl" text-anchor="middle">Neptune</text>
</g>

<!-- Stats panel on the right -->
<rect x="490" y="60" width="340" height="230" rx="8" fill="#161b22" stroke="#6AD3F7" stroke-width="0.5" opacity="0.9"/>

<text x="660" y="92" class="stat-lbl" text-anchor="middle">contribution stats</text>
<line x1="510" y1="102" x2="810" y2="102" stroke="#6AD3F7" stroke-width="0.3" opacity="0.3"/>

<text x="520" y="130" class="stat-lbl">this week</text>
<text x="800" y="130" class="stat-val" text-anchor="end">2</text>

<text x="520" y="162" class="stat-lbl">this month</text>
<text x="800" y="162" class="stat-val" text-anchor="end">36</text>

<text x="520" y="194" class="stat-lbl">total (year)</text>
<text x="800" y="194" class="stat-val" text-anchor="end">225</text>

<line x1="510" y1="210" x2="810" y2="210" stroke="#6AD3F7" stroke-width="0.3" opacity="0.3"/>

<text x="520" y="232" class="stat-lbl">orbit speed reflects</text>
<text x="520" y="250" class="stat-lbl">your commit activity</text>
<text x="520" y="268" class="stat-lbl" opacity="0.4">more commits = faster orbits</text>

<!-- Updated timestamp -->
<text x="430" y="350" class="updated" text-anchor="middle">updated 2026-07-13 03:27 UTC · solar system · naitik-patidar</text>
</svg>